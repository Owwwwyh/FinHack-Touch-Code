name: Backend CI
on:
  push:
    paths: ['backend/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install cryptography xgboost flask numpy pandas pytest
      - name: Generate test vectors
        run: python ml/test-vectors/generate_vectors.py
      - name: Run JWS tests
        run: python backend/tests/test_jws.py
