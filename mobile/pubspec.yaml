name: tng_finhack
description: TNG offline NFC payment wallet with AI safe-offline balance
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  dio: ^5.4.3
  retrofit: ^4.1.0
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.0
  cryptography: ^2.7.0
  tflite_flutter: ^0.10.4
  flutter_nfc_kit: ^3.5.0
  connectivity_plus: ^6.0.3
  local_auth: ^2.2.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  build_runner: ^2.4.10
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  mocktail: ^1.0.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/
    - assets/images/
